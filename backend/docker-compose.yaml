services:

  tts:
    build:
      context: ./tts
    ports:
      - "8880:8880"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - kokoro_cache:/root/.cache
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8880/health')" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  stt:
    build:
      context: ./stt
    ports:
      - "8881:8881"
    volumes:
      - whisper_cache:/root/.cache
    env_file:
      - ./stt/.env
    environment:
      - DEVICE=cpu
      - COMPUTE_TYPE=int8
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8881/health')" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  image_gen:
    build:
      context: ./image
    ports:
      - "8882:8882"
    volumes:
      - hf_cache:/root/.cache/huggingface
    env_file:
      - ./image/.env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8882/health')" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  code_exec:
    build:
      context: ./code_exec
    ports:
      - "8883:8883"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8883/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  music:
    build:
      context: ./music
    ports:
      - "8884:8884"
    volumes:
      - hf_cache:/root/.cache/huggingface
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8884/health')" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

volumes:
  kokoro_cache:
  whisper_cache:
  hf_cache:
