services:
  mcp-subject-matter:
    build:
      context: ./mcp-subject-matter
    ports:
      - "8770:8770"
    restart: unless-stopped
    env_file:
      - ./mcp-subject-matter/.env
    volumes:
      - ./mcp-subject-matter/subjects:/app/subjects

  student-history:
    build: ./student-history
    ports:
      - "8771:8771"
    volumes:
      # Persist the SQLite database outside the container
      - student-history-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "7860:7860"
    restart: unless-stopped
    depends_on:
      - mcp-subject-matter
      - student-history
    env_file:
      - ./frontend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  student-history-data:
