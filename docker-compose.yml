services:

  mcp-subject-matter:
    build: ./mcp-subject-matter
    ports:
      - "8770:8770"
    restart: unless-stopped

  student-history:
    build: ./student-history
    ports:
      - "8771:8771"
    volumes:
      # Persist the SQLite database outside the container
      - student-history-data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "7860:7860"
    environment:
      # Point the frontend at the containerised services
      YLIP_MCP_SUBJECT_MATTER_URL: "http://mcp-subject-matter:8770/sse"
      YLIP_STUDENT_STATE_BASE_URL: "http://student-history:8771"
    depends_on:
      - mcp-subject-matter
      - student-history
    restart: unless-stopped

volumes:
  student-history-data:
